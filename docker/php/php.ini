[PHP]
; 基本設定
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 300

; 日本語対応
default_charset = "UTF-8"

[Date]
date.timezone = "Asia/Tokyo"

[mbstring]
mbstring.language = Japanese

[opcache]
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
